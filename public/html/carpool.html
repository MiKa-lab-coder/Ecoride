<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="trouvez ici un covoiturage écoresponsable avec Ecoride.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
    <title>rechercher un covoiturage</title>
</head>
<body>
<header id="header-placeholder"></header>
<main>
    <section class="advanced-search">
        <h1>Rechercher un covoiturage</h1>
        <div class="advanced-search-container card">
            <h3>Trouvez votre covoiturage</h3>
            <form class="advanced-search-form" id="advanced-search-form" action="/search" method="GET">
                <label class="labels-hidden" for="departure">Départ : </label>
                <input type="text" id="departure" name="departure" list="cities" placeholder="Ville de départ" required>

                <label class="labels-hidden" for="arrival">Arrivée : </label>
                <input type="text" id="arrival" name="arrival" list="cities" placeholder="Ville d'arrivée" required>

                <datalist id="cities">
                    <option value="Paris"></option>
                    <option value="Lyon"></option>
                    <option value="Grenoble"></option>
                    <option value="Clermont-Ferrand"></option>
                    <option value="Marseille"></option>
                    <option value="Nice"></option>
                    <option value="Bordeaux"></option>
                    <option value="Poitiers"></option>
                    <option value="Limoges"></option>
                    <option value="Toulouse"></option>
                    <option value="Montpellier"></option>
                    <option value="Perpignan"></option>
                    <option value="Nantes"></option>
                    <option value="Rennes"></option>
                    <option value="Brest"></option>
                    <option value="Orléans"></option>
                    <option value="Tours"></option>
                    <option value="Rouen"></option>
                    <option value="Caen"></option>
                    <option value="Lille"></option>
                    <option value="Strasbourg"></option>
                    <option value="Nancy"></option>
                    <option value="Dijon"></option>
                    <option value="Besançon"></option>
                </datalist>

                <label class="labels-hidden" for="departure_day">Date de départ</label>
                <input type="date" id="departure_day" name="date" max="9999-12-31" required>

                <input class="valid-search-form" type="submit" value="Rechercher">

                <br>
                <button class="filters-btn" id="filters-btn" type="button">Filtres</button>

                <div class="advanced-search-filters js-hidden" id="advanced-search-filters">
                    <label for="carpool-type">Type de covoiturage:</label>
                    <select id="carpool-type" name="carpool-type">
                        <option value="all">Tous</option>
                        <option value="ecologic">Ecologique</option>
                    </select>
                    <label for="time">Heure de départ :</label>
                    <input type="time" id="time" name="time">
                    <label for="time2">Heure d'arrivée :</label>
                    <input type="time" id="time2" name="time2">

                    <label for="seats">Nombre de places restantes :</label>
                    <input type="number" id="seats" name="seats" min="1" max="6" placeholder="Nombre de places">

                    <label for="price">Prix maximum :</label>
                    <input type="number" id="price" name="price" min="0" step="1" placeholder="selectionnez un prix">

                    <label for="eco-rating">Note Ecorider :</label>
                    <input type="number" id="eco-rating" name="eco-rating" min="1" max="5" step="1"
                           placeholder="Note de 1 à 5">

                    <label for ="pet-allowed">Animaux acceptés :</label>
                    <select id="pet-allowed" name="pet-allowed">
                        <option value="all" selected>Indifférent</option>
                        <option value="yes">Oui</option>
                        <option value="no">Non</option></select>

                    <label for ="smoking-allowed">Fumeur accepté :</label>
                    <select id="smoking-allowed" name="smoking-allowed">
                        <option value="all" selected>Indifférent</option>
                        <option value="yes">Oui</option>
                        <option value="no">Non</option></select>

                    <button class="reset-btn" id="reset-filter" type="button">Effacer les filtres</button>
                </div>
            </form>
        </div>
    </section>
    <section class="search-results">
        <div id="results-container" class="results-container">

        </div>
        <div class="no-results"></div>
    </section>
</main>
<footer id="footer-placeholder"></footer>
<script src="../js/main.js" type="module"></script>
</body>
</html>
