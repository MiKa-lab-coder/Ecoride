<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inscrivez-vous sur Ecoride - Votre plateforme de covoiturage écoresponsable.">
    <link rel="stylesheet" href="../css/style.css">
    <title>Inscrivez-vous !!!</title>
</head>
<body>
<header id="header-placeholder"></header>
<section class="registration">
    <div class="registration-container">
        <h1>Inscription</h1>
        <p>Déjà inscrit ? <a class="registration-help" href="./connection.html">Connectez-vous ici</a></p>
        <form id="registration-form" class="registration-form" action="" method="post">
            <label for="name"></label>
            <input type="text" id="name" name="name" placeholder="Nom" required>
            <label for="surname"></label>
            <label for="username"></label>
            <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required>
            <label for="photo"></label>
            <input type="file" id="photo" name="photo" placeholder="Nom" accept="image/*">
            <input type="text" id="surname" name="surname" placeholder="Prénom" required>
            <label for="email"></label>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <label for="password"></label>
            <input type="password" id="password" name="password" placeholder="Mot de passe" required>
            <label for="confirm-password"></label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmer le mot de passe"
                   required>
            <p class="registration-help"><input class="cheked" type="radio" value="terms" id="terms" name="terms"
                                                required> acceptez nos <a href="./terms.html">conditions
                d'utilisation</a>.</p>
            <button type="submit">S'inscrire</button>

        </form>
    </div>
</section>


<footer id="footer-placeholder"></footer>
<script src="../js/main.js" type="module"></script>
</body>
</html>
