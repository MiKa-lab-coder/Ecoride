<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
    <title>informations détaillées</title>
</head>
<body>
<main>
    <!-- page qui présente une vue detaillée du trajet proposée avec
     avec infos sur le chauffeur : type voiture (marque, modele,eneregie), preference chauffeur (fumeur, animaux ...,  -->
    <section class="rider-details">
        <div class="details-container container">

            <h1>Plus d'infos</h1>
            <div class="details-content card">
                <h2>Chauffeur</h2>
                <p><strong>Nom:</strong> Jean Dupont</p>
                <p><strong>Type de voiture : </strong>Tesla Model 3 (Électrique)</p>
                <p><strong>Préférences : </strong>Non-fumeur, Animaux acceptés</p>

                <h2 class="middle">Trajet</h2>
                <p><strong>Départ:</strong> Paris, Gare Saint-Lazare</p>
                <p><strong>Arrivée:</strong> Lyon, Gare Part-Dieu</p>
                <p><strong>Date et Heure : </strong>15 avril 2023, 14:00</p>

                <h2>Tarif</h2>
                <p><strong>Prix par passager : </strong>30€</p>

                <input type="submit" value="Réserver" class="btn" id="btn-reserve">
                <!-- bouton pour reserver le trajet, double confirmation -->
                <!-- pour participer au trajet, l'utilisateur doit etre connecté et avoir assez de credit et places libres > 0 -->

            </div>
        </div>
    </section>
</main>
<script src="../js/main.js" type="module"></script>
</body>
</html>
