<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="Contactez-nous pour toute question ou information concernant Ecoride, votre plateforme de covoiturage écoresponsable.">
  <link rel="stylesheet" href="../css/style.css">
  <title>Contactez-nous!!!</title>
</head>
<body>
<header id="header-placeholder"></header>
<section class="contact">
  <div class="contact-container">
    <h1>Nous contacter</h1>

      <div class="infos">
          <h2>Nos coordonées : </h2>
          <span class="link"><img src="../img/envelope.png" alt="icon envelope" class="contact-icons"><p>Email : EcoRide@mail.mail</p></span>
          <span class="link"><img class="contact-icons" src="../img/phone.png" alt="phone-icons"><p>Téléphone : +33 1 23 45 67 89</p></span>
          <span class="link"><img class="contact-icons" src="../img/location.png" alt="location-icons"><p>Adresse : 123 Rue de l'Écologie, Paris, France</p></span>
      </div>
    <form id="contact-form" class="contact-form" action="" method="post">
        <label for="name"></label>
        <input type="text" id="name" name="name" placeholder="Nom Complet" required>
          <label for="subject"></label>
        <input type="text" id="subject" name="subject" placeholder="Sujet" required>
        <label for="email"></label>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <label for="message"></label>
        <textarea id="message" name="message" placeholder="Votre message" required></textarea>
        <button type="submit">Envoyer</button>
        </form>
    </div>
</section>
<footer id="footer-placeholder"></footer>
<script src="../js/main.js" type="module"></script>
</body>
</html>
