<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Contactez-nous pour toute question ou information concernant Ecoride, votre plateforme de covoiturage écoresponsable.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
    <title>Contactez-nous!!!</title>
</head>
<body>
<header id="header-placeholder"></header>
<main>
    <section class="contact">
        <div class="contact-container container card">
            <h1>Nous contacter</h1>

            <div class="infos">
                <h2>Nos coordonées : </h2>
                <span class="link"><img src="../img/envelope.png" alt="icon envelope" class="contact-icons">Email : EcoRide@mail.mail</span>
                <span class="link"><img class="contact-icons" src="../img/phone.png" alt="phone-icons">Téléphone : 01 23 45 67 89</span>
                <span class="link"><img class="contact-icons" src="../img/location.png" alt="location-icons">Adresse : 123 Rue de l'Écologie, Paris, France</span>
            </div>
            <form class="contact-form" action="" method="post">
                <label class="labels-hidden" for="name">nom complet</label>
                <input type="text" id="name" name="name" placeholder="Nom Complet" required>
                <label class="labels-hidden" for="subject">sujet</label>
                <input type="text" id="subject" name="subject" placeholder="Sujet" required>
                <label class="labels-hidden" for="email">email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
                <label class="labels-hidden" for="message">votre message</label>
                <textarea id="message" name="message" placeholder="Entrez votre message" required></textarea>
                <input type="submit" value="Envoyer" id="send-btn">
            </form>
            <div id="form-response"></div>
        </div>
    </section>
</main>
<footer id="footer-placeholder"></footer>
<script src="../js/main.js" type="module"></script>
</body>
</html>
