services:
  # MySQL
  database:
    image: mariadb:10.6
    restart: always
    container_name: ecoride_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./SQL/Ecoride.sql:/docker-entrypoint-initdb.d/Ecoride.sql

  #mongoDB
  mongo:
    image: mongo:latest
    restart: always
    container_name: ecoride_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # php
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php
    restart: always
    volumes:
      - .:/var/www/html/
    depends_on:
      - database
      - mongo
    env_file:
      - .env # Charge le fichier .env

  # nginx
  nginx:
    build:
      context: .
      dockerfile: Nginx.dockerfile
    restart: always
    volumes:
      - .:/var/www/html/
      - ./Nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    depends_on:
      - php
    command: sh -c "chown -R nginx:nginx /var/www/html && nginx -g 'daemon off;'"

volumes:
  db_data:
  mongo_data:
